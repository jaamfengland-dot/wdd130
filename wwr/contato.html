<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fale Conosco Corredeiras Rafting</title>
    <meta name="description"
        content="Entre em contato com a Corredeiras Rafting para tirar dúvidas, fazer reservas ou enviar sugestões sobre nossas aventuras de rafting.">
    <meta name="author" content="João Augusto Anselmo Moraes Ferreira">
    <link rel="stylesheet" href="estilos/rafting.css">
</head>

<body>

    <header>
        <img src="imagens/logo.png" alt="Logotipo da Corredeiras" width="150">
        <nav>
            <ul>
                <li><a href="index.html">Página Inicial</a></li>
                <li><a href="sobre.html">Sobre Nós</a></li>
                <li><a href="passeios.html">Passeios</a></li>
                <li><a href="contato.html">Fale Conosco</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- INFORMAÇÕES DA EMPRESA -->
        <div class="info-empresa">
            <h1>Corredeiras Rafting</h1>
            <p>
                345 Vila Lisboa<br>
                Campinas - São Paulo<br>
                +55 (23) 99243-6234<br>
                corredeiras@gmail.com
            </p>
        </div>

        <!-- MAPA + FORMULÁRIO -->
        <div class="contato-principal">

            <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d2239685.768010581!2d-47.68863513224167!3d-22.787425258491034!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sus!4v1780411634528!5m2!1spt-BR!2sus"
                width="100%" height="420" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>

            <form>
                <label for="nome-completo">Nome</label>
                <input type="text" id="nome-completo" name="nome-completo" placeholder="Digite aqui" required>

                <label for="email-do-usuario">E-mail</label>
                <input type="email" id="email-do-usuario" name="email-do-usuario" placeholder="Digite aqui" required>

                <fieldset>
                    <legend>Propósito da Mensagem</legend>
                    <div class="linha-radio">
                        <input type="radio" id="duvida" name="assunto" value="duvida" required>
                        <label for="duvida">Dúvida Geral</label>
                    </div>
                    <div class="linha-radio">
                        <input type="radio" id="reserva" name="assunto" value="reserva">
                        <label for="reserva">Pergunta sobre Reserva</label>
                    </div>
                    <div class="linha-radio">
                        <input type="radio" id="sugestao" name="assunto" value="sugestao">
                        <label for="sugestao">Sugestão</label>
                    </div>
                </fieldset>

                <label for="feedback">Mensagem</label>
                <textarea id="feedback" name="feedback" rows="5" placeholder="Digite aqui" required></textarea>

                <div class="linha-checkbox">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Por favor, me inscreva na newsletter mensal</label>
                </div>

                <button type="submit">Entrar em Contato!</button>
            </form>

        </div>

        <!-- FUNCIONÁRIOS -->
        <section class="aventura-section">
            <h2>Estamos Aqui para Servi-lo!</h2>
            <div class="galeria">

                <figure>
                    <img src="imagens/pablo.jpg" alt="Perfil do funcionário Paulo Escobar">
                    <figcaption>
                        Paulo Escobar<br>
                        Diretor de Marketing
                    </figcaption>
                </figure>

                <figure>
                    <img src="imagens/carlos.jpg" alt="Perfil do funcionário Carlos Drumonde">
                    <figcaption>
                        Carlos Drumonde<br>
                        Especialista em Rafting
                    </figcaption>
                </figure>

                <figure>
                    <img src="imagens/micaela.jpg" alt="Perfil da funcionária Micaela Jackson">
                    <figcaption>
                        Micaela Jackson<br>
                        Gestora de Administração
                    </figcaption>
                </figure>

            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 Corredeiras | João Augusto</p>
        <nav class="redes-sociais socialmedia">
            <a href="https://facebook.com">
                <img src="imagens/facebook.svg" alt="Ícone do Facebook">
            </a>
            <a href="https://linkedin.com">
                <img src="imagens/linkedin.svg" alt="Ícone do LinkedIn">
            </a>
            <a href="https://instagram.com">
                <img src="imagens/instagram.svg" alt="Ícone do Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
